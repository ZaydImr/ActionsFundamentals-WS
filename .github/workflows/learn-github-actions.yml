name: learn-github-actions

run-name: ${{ github.actor }} is learning Github Actions

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  hello-keith:
    if: github.actor == 'MrKeithM'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run a one-line script
        run: echo Hello, Keith!

  hello-sarah:
    if: github.actor == 'Sazzo100'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run a one-line script
        run: echo Hello, Sarah!

  hello-world:
    if: github.actor != 'Sazzo100' && github.actor != 'MrKeithM'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run a one-line script
        run: echo Hello, World!
