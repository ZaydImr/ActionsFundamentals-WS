name: Cache Example

on:
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - name: Creating a txt file
        run: |
          echo 'My name is ${{github.actor}}' >> name.txt
      
      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: name.txt
          key: ${{github.actor}}-name
      
